<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StableBlock - Deterministic Block Diagrams</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #0F172A; --bg2: #1E293B; --border: #334155;
  --text: #E2E8F0; --muted: #64748B; --dim: #475569;
  --accent: #6366F1; --accent2: #818CF8; --accent-bg: #312E81;
  --green: #22C55E; --amber: #F59E0B; --red: #EF4444;
}
body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans','Noto Sans JP',sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Header */
#header { display:flex; align-items:center; justify-content:space-between; padding:6px 12px; border-bottom:1px solid var(--bg2); flex-shrink:0; }
#header .logo { display:flex; align-items:center; gap:8px; }
#header .logo-icon { width:24px; height:24px; border-radius:5px; background:linear-gradient(135deg,#6366F1,#8B5CF6); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#fff; }
#header .logo-text { font-weight:700; font-size:14px; }
#header .badge { font-size:9px; color:#A5B4FC; font-weight:600; background:var(--accent-bg); padding:2px 7px; border-radius:10px; }
.toolbar { display:flex; gap:4px; align-items:center; }
.tb { padding:4px 10px; font-size:11px; font-weight:600; border:1px solid var(--border); border-radius:5px; cursor:pointer; background:var(--bg2); color:#94A3B8; font-family:inherit; }
.tb:hover { background:#334155; }
.tb-accent { border-color:var(--accent); color:#A5B4FC; }
.tb-green { border-color:var(--green); color:#86EFAC; }
.tb-hl-active { border-color:var(--amber); color:#FDE68A; background:#422006; }
.tb-anno-active { border-color:#F59E0B; color:#FDE68A; background:#422006; }
.tb-anno-edit { border-color:#EC4899; color:#F9A8D4; background:#500724; }
.sep { width:1px; height:14px; background:var(--border); margin:0 4px; }

/* Body */
#body { flex:1; display:flex; overflow:hidden; }

/* Editor Panel */
#editor-panel { width:30%; min-width:240px; display:flex; flex-direction:column; border-right:1px solid var(--bg2); }
.panel-label { padding:4px 10px; font-size:10px; font-weight:600; color:var(--muted); border-bottom:1px solid var(--bg2); display:flex; align-items:center; gap:4px; }
.panel-label .dot { font-size:10px; }
#error-bar { padding:4px 10px; background:#7F1D1D; color:#FCA5A5; font-size:10px; display:none; }
#editor-wrap { flex:1; display:flex; overflow:hidden; background:var(--bg); }
#line-nums { width:40px; padding:12px 4px 12px 0; text-align:right; font-family:'IBM Plex Mono',monospace; font-size:12px; line-height:20px; color:var(--dim); user-select:none; overflow:hidden; flex-shrink:0; }
#editor { flex:1; background:transparent; color:var(--text); border:none; outline:none; font-family:'IBM Plex Mono',monospace; font-size:12px; line-height:20px; padding:12px 12px 12px 4px; resize:none; white-space:pre; overflow-x:auto; tab-size:2; }

/* Preview Panel */
#preview-panel { flex:1; display:flex; flex-direction:column; overflow:hidden; }
#preview-area { flex:1; overflow:auto; padding:12px; background:repeating-conic-gradient(#1E293B 0% 25%,#0F172A 0% 50%) 0 0/24px 24px; }
#svg-wrap { background:#fff; border-radius:8px; display:inline-block; line-height:0; }
#svg-wrap svg { cursor:default; }

/* Property Panel */
#prop-panel { width:220px; min-width:220px; border-left:1px solid var(--bg2); display:flex; flex-direction:column; overflow:hidden; }
#prop-content { flex:1; overflow-y:auto; padding:12px; }
.prop-section { margin-bottom:12px; }
.prop-label { font-size:10px; color:var(--muted); font-weight:600; margin-bottom:2px; text-transform:uppercase; letter-spacing:0.05em; }
.prop-row { display:flex; gap:6px; margin-bottom:6px; }
.prop-input { background:var(--bg2); border:1px solid var(--border); border-radius:4px; color:var(--text); padding:4px 8px; font-size:12px; width:100%; outline:none; font-family:'IBM Plex Mono',monospace; }
.prop-input:focus { border-color:var(--accent); }
.prop-sub { font-size:9px; color:var(--dim); }
.prop-btn { padding:6px 12px; font-size:11px; font-weight:600; border:1px solid var(--border); border-radius:5px; cursor:pointer; background:var(--bg2); color:#94A3B8; width:100%; font-family:inherit; }
.prop-btn:hover { background:#334155; }
.prop-btn-accent { border-color:var(--accent); color:#A5B4FC; }
.prop-btn-red { border-color:var(--red); color:#FCA5A5; background:#1C1017; }
.color-grid { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px; }
.color-dot { width:20px; height:20px; border-radius:4px; cursor:pointer; border:2px solid transparent; }
.color-dot.active { border-color:#fff; box-shadow:0 0 0 1px var(--accent); }
.style-btn { padding:3px 10px; font-size:11px; font-weight:600; border:1px solid var(--border); border-radius:5px; cursor:pointer; background:var(--bg2); color:#94A3B8; font-family:inherit; }
.style-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.stepper { display:flex; align-items:stretch; }
.stepper input { flex:1; min-width:0; text-align:center; border-radius:4px 0 0 4px; border-right:none; }
.step-col { display:flex; flex-direction:column; width:20px; flex-shrink:0; }
.step-btn { flex:1; border:1px solid var(--border); background:var(--bg2); color:#94A3B8; cursor:pointer; font-size:9px; font-weight:700; display:flex; align-items:center; justify-content:center; font-family:inherit; padding:0; line-height:1; }
.step-btn:hover { background:#334155; color:#E2E8F0; }
.step-btn:active { background:var(--accent); color:#fff; }
.step-btn.up { border-radius:0 4px 0 0; border-bottom:none; }
.step-btn.dn { border-radius:0 0 4px 0; }

/* Status */
#status { display:flex; gap:14px; padding:3px 12px; border-top:1px solid var(--bg2); font-size:10px; color:var(--dim); flex-shrink:0; }

input[type=number] { -moz-appearance:textfield; }
input[type=number]::-webkit-inner-spin-button { -webkit-appearance:none; }
</style>
</head>
<body>

<div id="header">
  <div class="logo">
    <div class="logo-icon">◆</div>
    <span class="logo-text">StableBlock</span>
    <span class="badge">v0.5</span>
  </div>
  <div class="toolbar">
    <button class="tb" onclick="setZoom(-1)">−</button>
    <span id="zoom-label" style="font-size:11px;color:#94A3B8;min-width:36px;text-align:center">100%</span>
    <button class="tb" onclick="setZoom(1)">+</button>
    <div class="sep"></div>
    <button class="tb" onclick="undo()" title="Ctrl+Z">↩</button>
    <button class="tb" onclick="redo()" title="Ctrl+Y">↪</button>
    <div class="sep"></div>
    <button class="tb" id="hl-btn" onclick="toggleHighlight()" title="H キーでも切替">◎ HL</button>
    <div class="sep"></div>
    <button class="tb tb-anno-active" id="anno-btn" onclick="toggleAnnotations()" title="N キーでも切替">◇ 注釈</button>
    <button class="tb" id="anno-edit-btn" onclick="toggleAnnotationEdit()" title="注釈編集モード" style="opacity:0.4;pointer-events:none">✎ 編集</button>
    <div class="sep"></div>
    <button class="tb" onclick="fixNames()" title="__new_ IDをラベルから自動生成">ID補正</button>
    <div class="sep"></div>
    <button class="tb tb-accent" onclick="exportSVG()">SVG</button>
    <button class="tb tb-accent" onclick="exportPNG()">PNG</button>
    <div class="sep"></div>
    <button class="tb tb-green" onclick="exportSB()">.sb 保存</button>
    <button class="tb tb-green" onclick="document.getElementById('file-input').click()">.sb 読込</button>
    <input type="file" id="file-input" accept=".sb,.stableblock,.txt" style="display:none" onchange="importSB(this)">
  </div>
</div>

<div id="body">
  <div id="editor-panel">
    <div class="panel-label"><span class="dot" style="color:var(--accent)">●</span> DSL</div>
    <div id="error-bar"></div>
    <div id="editor-wrap">
      <div id="line-nums"></div>
      <textarea id="editor" spellcheck="false"></textarea>
    </div>
  </div>
  <div id="preview-panel">
    <div class="panel-label">
      <span class="dot" style="color:var(--green)">●</span> PREVIEW
      <span style="margin-left:auto;color:var(--dim);font-weight:400">ドラッグで移動（親グループは子も連動）</span>
    </div>
    <div id="preview-area"><div id="svg-wrap"></div></div>
  </div>
  <div id="prop-panel">
    <div class="panel-label"><span class="dot" style="color:var(--amber)">●</span> <span id="prop-title">ツール</span></div>
    <div id="prop-content"></div>
  </div>
</div>

<div id="status"></div>

<script>
// ═══════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════
let dsl = `# StableBlock v0.5
@canvas width=960 height=520 grid=20

# Application
group app "Application" at 1,1 size 46x6 color=#EEF2FF border=#818CF8

block ui    "UI"        at 2,3 size 9x3 color=#6366F1 text=#FFFFFF round=6
block logic "Logic"     at 13,3 size 9x3 color=#6366F1 text=#FFFFFF round=6
block data  "Data Mgr"  at 24,3 size 9x3 color=#6366F1 text=#FFFFFF round=6

# Middleware
group mw "Middleware" at 1,8 size 46x6 color=#FEF3C7 border=#F59E0B

block comm "Comm"     at 2,10 size 9x3 color=#D97706 text=#FFFFFF round=4
block diag "Diag"     at 13,10 size 9x3 color=#D97706 text=#FFFFFF round=4
block log  "Logger"   at 24,10 size 9x3 color=#D97706 text=#FFFFFF round=4

# Platform
group pf "Platform" at 1,15 size 46x6 color=#DCFCE7 border=#22C55E

block os   "OS"       at 2,17 size 13x3 color=#16A34A text=#FFFFFF round=4
block drv  "Drivers"  at 17,17 size 13x3 color=#16A34A text=#FFFFFF round=4
block hal  "HAL"      at 32,17 size 13x3 color=#16A34A text=#FFFFFF round=4

# Connections
ui    -> comm
logic -> diag
data  -> log
comm  -> os
diag  -> drv
log   -> hal
`;
let zoom=1, parsed=null, sel=[], addCounter=1, suppressSync=false, highlight=false, showAnnotations=true, annotationEdit=false;
// Undo/Redo
const history=[], future=[]; const MAX_HIST=80;
function pushHistory(){history.push(dsl);if(history.length>MAX_HIST)history.shift();future.length=0;}
function undo(){if(!history.length)return;future.push(dsl);dsl=history.pop();sel=[];refresh();}
function redo(){if(!future.length)return;history.push(dsl);dsl=future.pop();sel=[];refresh();}
// Clipboard
let clipboard=null; // [{type,dslLine}]
const COLORS=["#6366F1","#8B5CF6","#EC4899","#EF4444","#F59E0B","#D97706","#22C55E","#16A34A","#06B6D4","#3B82F6","#64748B","#DC2626","#1E293B","#0F172A","#334155","#475569"];
const BG_COLORS=["#EEF2FF","#F5F3FF","#FCE7F3","#FEE2E2","#FEF3C7","#FFF7ED","#DCFCE7","#D1FAE5","#CFFAFE","#DBEAFE","#F1F5F9","#F8FAFC"];
function isSel(id){return sel.some(s=>s.id===id)}
function getItem(s){return parsed.blockMap[s.id]||parsed.groupMap[s.id]||parsed.noteMap[s.id]}
function isAnnotationConn(c){return !!(parsed.noteMap[c.from]||parsed.noteMap[c.to])}
function getAllItemMap(){return Object.assign({},parsed.blockMap,parsed.noteMap)}

// ═══════════════════════════════════════════════
// Parser
// ═══════════════════════════════════════════════
function parseDSL(text){
  const lines=text.split("\n"),canvas={width:960,height:640,grid:20};
  const blocks=[],groups=[],notes=[],connections=[],errors=[],blockMap={},groupMap={},noteMap={};
  for(let i=0;i<lines.length;i++){
    const raw=lines[i].trim(); if(!raw||raw.startsWith("#"))continue; const ln=i+1;
    try{
      if(raw.startsWith("@canvas")){const w=raw.match(/width=(\d+)/),h=raw.match(/height=(\d+)/),g=raw.match(/grid=(\d+)/);if(w)canvas.width=+w[1];if(h)canvas.height=+h[1];if(g)canvas.grid=+g[1];continue;}
      let m=raw.match(/^block\s+(\S+)\s+"([^"]*)"\s+at\s+([\d.]+),([\d.]+)\s+size\s+([\d.]+)x([\d.]+)(.*)/);
      if(m){const[,id,label,x,y,w,h,rest]=m;const b={type:"block",id,label,x:+x,y:+y,w:+w,h:+h,color:rest.match(/color=(\S+)/)?.[1]||"#3B82F6",textColor:rest.match(/text=(\S+)/)?.[1]||"#FFFFFF",borderColor:rest.match(/border=(\S+)/)?.[1]||null,round:+(rest.match(/round=(\d+)/)?.[1]||"4"),style:rest.match(/style=(\S+)/)?.[1]||"solid",line:ln};blocks.push(b);blockMap[id]=b;continue;}
      m=raw.match(/^group\s+(\S+)\s+"([^"]*)"\s+at\s+([\d.]+),([\d.]+)\s+size\s+([\d.]+)x([\d.]+)(.*)/);
      if(m){const[,id,label,x,y,w,h,rest]=m;const g={type:"group",id,label,x:+x,y:+y,w:+w,h:+h,color:rest.match(/color=(\S+)/)?.[1]||"#F3F4F6",borderColor:rest.match(/border=(\S+)/)?.[1]||"#9CA3AF",line:ln};groups.push(g);groupMap[id]=g;continue;}
      m=raw.match(/^note\s+(\S+)\s+"([^"]*)"\s+at\s+([\d.]+),([\d.]+)\s+size\s+([\d.]+)x([\d.]+)(.*)/);
      if(m){const[,id,label,x,y,w,h,rest]=m;const n={type:"note",id,label,x:+x,y:+y,w:+w,h:+h,color:rest.match(/color=(\S+)/)?.[1]||"#FEF3C7",textColor:rest.match(/text=(\S+)/)?.[1]||"#92400E",borderColor:rest.match(/border=(\S+)/)?.[1]||null,round:+(rest.match(/round=(\d+)/)?.[1]||"4"),style:rest.match(/style=(\S+)/)?.[1]||"solid",line:ln};notes.push(n);noteMap[id]=n;continue;}
      m=raw.match(/^(\S+)\s+(-->|->)\s+(\S+)\s*(?:"([^"]*)")?\s*(.*)/);
      if(m){const[,from,arrow,to,label,rest]=m;connections.push({from,to,label:label||"",color:rest?.match(/color=(\S+)/)?.[1]||"#64748B",style:rest?.match(/style=(\S+)/)?.[1]||"solid",bidir:arrow==="-->",line:ln});continue;}
      errors.push({line:ln,msg:raw.substring(0,40)});
    }catch(e){errors.push({line:ln,msg:e.message});}
  }
  return{canvas,blocks,groups,notes,connections,errors,blockMap,groupMap,noteMap};
}

// ═══════════════════════════════════════════════
// DSL Updaters
// ═══════════════════════════════════════════════
function updatePos(type,id,nx,ny){const re=new RegExp(`^(\\s*${type}\\s+)(${id})(\\s+"[^"]*"\\s+at\\s+)[\\d.]+,[\\d.]+(\\s+size\\s+.*)$`,"m");dsl=dsl.replace(re,`$1$2$3${nx},${ny}$4`);}
function updateSize(type,id,nw,nh){const re=new RegExp(`^(\\s*${type}\\s+${id}\\s+"[^"]*?"\\s+at\\s+[\\d.]+,[\\d.]+\\s+size\\s+)[\\d.]+x[\\d.]+`,"m");dsl=dsl.replace(re,`$1${nw}x${nh}`);}
function updateProp(type,id,prop,val){const lines=dsl.split("\n"),lr=new RegExp(`^\\s*${type}\\s+${id}\\s+`),pr=new RegExp(`${prop}=\\S+`);for(let i=0;i<lines.length;i++){if(!lr.test(lines[i]))continue;lines[i]=pr.test(lines[i])?lines[i].replace(pr,`${prop}=${val}`):lines[i].trimEnd()+` ${prop}=${val}`;break;}dsl=lines.join("\n");}
function updateLabel(type,id,label){const re=new RegExp(`^(\\s*${type}\\s+${id}\\s+)"[^"]*"(\\s+at\\s+.*)$`,"m");dsl=dsl.replace(re,`$1"${label}"$2`);}
function isInside(c,p){return c.x>=p.x&&c.y>=p.y&&c.x+c.w<=p.x+p.w&&c.y+c.h<=p.y+p.h;}
function findChildren(gr){return{childBlocks:parsed.blocks.filter(b=>isInside(b,gr)),childGroups:parsed.groups.filter(g=>g.id!==gr.id&&isInside(g,gr))};}

// ═══════════════════════════════════════════════
// Highlight
// ═══════════════════════════════════════════════
function getConnectedIds(){
  // Returns set of all block IDs that participate in any connection
  if(!parsed)return null;
  const ids=new Set();
  parsed.connections.forEach(c=>{ids.add(c.from);ids.add(c.to);});
  return ids;
}
function getHighlightedGroups(connectedIds){
  // Returns set of group IDs that contain at least one connected block
  const groups=new Set();
  parsed.blocks.forEach(b=>{
    if(connectedIds.has(b.id)){
      // Find which group contains this block
      parsed.groups.forEach(gr=>{if(isInside(b,gr))groups.add(gr.id);});
    }
  });
  return groups;
}
function isHighlightedConn(c,connectedIds){
  return connectedIds.has(c.from)&&connectedIds.has(c.to);
}
function toggleHighlight(){
  highlight=!highlight;
  document.getElementById('hl-btn').classList.toggle('tb-hl-active',highlight);
  renderSVG();
}
function toggleAnnotations(){
  showAnnotations=!showAnnotations;
  document.getElementById('anno-btn').classList.toggle('tb-anno-active',showAnnotations);
  const editBtn=document.getElementById('anno-edit-btn');
  editBtn.style.opacity=showAnnotations?'':'0.4';
  editBtn.style.pointerEvents=showAnnotations?'':'none';
  if(!showAnnotations&&annotationEdit){annotationEdit=false;editBtn.classList.remove('tb-anno-edit');sel=sel.filter(s=>s.type!=='note');}
  renderSVG();renderProps();
}
function toggleAnnotationEdit(){
  if(!showAnnotations)return;
  annotationEdit=!annotationEdit;
  document.getElementById('anno-edit-btn').classList.toggle('tb-anno-edit',annotationEdit);
  if(annotationEdit)sel=sel.filter(s=>s.type==='note');
  else sel=sel.filter(s=>s.type!=='note');
  renderSVG();renderProps();
}

// ═══════════════════════════════════════════════
// SVG Rendering
// ═══════════════════════════════════════════════
function getSide(fb,tb,g){
  const gapB=tb.y-(fb.y+fb.h),gapT=fb.y-(tb.y+tb.h),gapR=tb.x-(fb.x+fb.w),gapL=fb.x-(tb.x+tb.w);
  const vBest=Math.max(gapB,gapT),hBest=Math.max(gapR,gapL);
  if(vBest>=hBest)return gapB>=gapT?{fs:'bottom',ts:'top'}:{fs:'top',ts:'bottom'};
  return gapR>=gapL?{fs:'right',ts:'left'}:{fs:'left',ts:'right'};
}
function portPos(b,side,idx,total,g){
  const bx=b.x*g,by=b.y*g,bw=b.w*g,bh=b.h*g,pad=0.2;
  const t=total===1?0.5:pad+(1-2*pad)*idx/(total-1);
  if(side==='top')return{x:bx+bw*t,y:by};if(side==='bottom')return{x:bx+bw*t,y:by+bh};
  if(side==='left')return{x:bx,y:by+bh*t};return{x:bx+bw,y:by+bh*t};
}
function computePorts(connections,blockMap,g){
  const sides=connections.map(c=>{const fb=blockMap[c.from],tb=blockMap[c.to];return fb&&tb?getSide(fb,tb,g):null;});
  const sm={};
  connections.forEach((c,i)=>{if(!sides[i])return;const fb=blockMap[c.from],tb=blockMap[c.to];
    if(!sm[c.from])sm[c.from]={};const fs=sides[i].fs;if(!sm[c.from][fs])sm[c.from][fs]=[];sm[c.from][fs].push({ci:i,ox:tb.x+tb.w/2,oy:tb.y+tb.h/2});
    if(!sm[c.to])sm[c.to]={};const ts=sides[i].ts;if(!sm[c.to][ts])sm[c.to][ts]=[];sm[c.to][ts].push({ci:i,ox:fb.x+fb.w/2,oy:fb.y+fb.h/2});
  });
  for(const bid in sm)for(const side in sm[bid]){const list=sm[bid][side];list.sort((a,b)=>(side==='left'||side==='right')?(a.oy-b.oy):(a.ox-b.ox));}
  return connections.map((c,i)=>{if(!sides[i])return null;const fb=blockMap[c.from],tb=blockMap[c.to];
    const fl=sm[c.from][sides[i].fs],tl=sm[c.to][sides[i].ts];
    return{fp:portPos(fb,sides[i].fs,fl.findIndex(p=>p.ci===i),fl.length,g),tp:portPos(tb,sides[i].ts,tl.findIndex(p=>p.ci===i),tl.length,g),fs:sides[i].fs,ts:sides[i].ts};
  });
}
function extPt(p,side,d){if(side==='top')return{x:p.x,y:p.y-d};if(side==='bottom')return{x:p.x,y:p.y+d};if(side==='left')return{x:p.x-d,y:p.y};return{x:p.x+d,y:p.y};}
function bpath(fp,tp,fs,ts){
  const dx=tp.x-fp.x,dy=tp.y-fp.y,dist=Math.sqrt(dx*dx+dy*dy);
  const cpd=Math.max(30,dist*0.4);
  const c1=extPt(fp,fs,cpd),c2=extPt(tp,ts,cpd);
  return`M${fp.x},${fp.y} C${c1.x},${c1.y} ${c2.x},${c2.y} ${tp.x},${tp.y}`;
}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function renderSVG(){
  if(!parsed)return;
  const{canvas,blocks,groups,notes,connections,blockMap}=parsed, g=canvas.grid;
  const hlIds=highlight?getConnectedIds():null;
  const hlGroups=hlIds?getHighlightedGroups(hlIds):null;
  const dim=0.15;
  const normalConns=connections.filter(c=>!isAnnotationConn(c));
  const annoConns=connections.filter(c=>isAnnotationConn(c));
  const allItems=getAllItemMap();
  let s=`<svg width="${canvas.width*zoom}" height="${canvas.height*zoom}" viewBox="0 0 ${canvas.width} ${canvas.height}" xmlns="http://www.w3.org/2000/svg" style="font-family:'IBM Plex Sans','Noto Sans JP',sans-serif">`;
  s+=`<defs><pattern id="gd" width="${g}" height="${g}" patternUnits="userSpaceOnUse"><circle cx="${g/2}" cy="${g/2}" r="0.5" fill="#CBD5E1" opacity="0.5"/></pattern>`;
  connections.forEach((c,i)=>{s+=`<marker id="a${i}" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,3.5 L0,7 Z" fill="${c.color}"/></marker>`;});
  s+=`</defs><rect width="100%" height="100%" fill="url(#gd)"/>`;

  // Groups
  groups.forEach(gr=>{const sl=isSel(gr.id);const dimmed=hlIds&&!hlGroups.has(gr.id);
    s+=`<g data-type="group" data-id="${gr.id}" style="cursor:grab"${dimmed?` opacity="${dim}"`:''}>`;
    s+=`<rect x="${gr.x*g}" y="${gr.y*g}" width="${gr.w*g}" height="${gr.h*g}" fill="${gr.color}" stroke="${sl?'#6366F1':gr.borderColor}" stroke-width="${sl?3:1.5}" rx="8" opacity="0.85"${sl?' stroke-dasharray="8,4"':''}/>`;
    s+=`<text x="${gr.x*g+8}" y="${gr.y*g+14}" font-size="11" font-weight="600" fill="${gr.borderColor}" opacity="0.9" style="pointer-events:none">${esc(gr.label)}</text></g>`;
  });
  // Normal connections
  const ports=computePorts(normalConns,blockMap,g);
  normalConns.forEach((c,i)=>{const p=ports[i];if(!p)return;const{fp,tp,fs,ts}=p;const dash=c.style==="dashed"?' stroke-dasharray="6,3"':'';const cDimmed=hlIds&&!isHighlightedConn(c,hlIds);
    const ci=connections.indexOf(c);
    s+=`<g${cDimmed?` opacity="${dim}"`:''}>`;
    s+=`<path d="${bpath(fp,tp,fs,ts)}" fill="none" stroke="${c.color}" stroke-width="1.5"${dash} marker-end="url(#a${ci})"${c.bidir?` marker-start="url(#a${ci})"`:''}/>`;
    if(c.label)s+=`<text x="${(fp.x+tp.x)/2}" y="${(fp.y+tp.y)/2-5}" font-size="10" fill="${c.color}" text-anchor="middle" font-weight="500">${esc(c.label)}</text>`;
    s+=`</g>`;});
  // Blocks
  blocks.forEach(b=>{const sl=isSel(b.id),sw=sl?2.5:b.style==="bold"?2.5:1,dash=b.style==="dashed"?' stroke-dasharray="6,3"':'',flt=sl?"drop-shadow(0 4px 12px rgba(99,102,241,0.5))":"drop-shadow(0 1px 2px rgba(0,0,0,0.12))";const bDimmed=hlIds&&!hlIds.has(b.id);
    s+=`<g data-type="block" data-id="${b.id}" style="cursor:grab"${bDimmed?` opacity="${dim}"`:''}>`;
    s+=`<rect x="${b.x*g}" y="${b.y*g}" width="${b.w*g}" height="${b.h*g}" fill="${b.color}" stroke="${sl?'#FFFFFF':(b.borderColor||b.color)}" stroke-width="${sw}"${dash} rx="${b.round}" style="filter:${flt}"/>`;
    b.label.split("\\n").forEach((line,li,arr)=>{const ty=b.y*g+b.h*g/2+(li-(arr.length-1)/2)*14;s+=`<text x="${b.x*g+b.w*g/2}" y="${ty}" font-size="11" font-weight="600" fill="${b.textColor}" text-anchor="middle" dominant-baseline="central" style="pointer-events:none">${esc(line)}</text>`;});
    s+=`</g>`;});

  // Annotation layer (on top)
  if(showAnnotations){
    const annoPorts=computePorts(annoConns,allItems,g);
    annoConns.forEach((c,i)=>{const p=annoPorts[i];if(!p)return;const{fp,tp,fs,ts}=p;
      const ci=connections.indexOf(c);
      s+=`<g opacity="${annotationEdit?1:0.7}">`;
      s+=`<path d="${bpath(fp,tp,fs,ts)}" fill="none" stroke="${c.color}" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#a${ci})"${c.bidir?` marker-start="url(#a${ci})"`:''}/>`;
      if(c.label)s+=`<text x="${(fp.x+tp.x)/2}" y="${(fp.y+tp.y)/2-5}" font-size="10" fill="${c.color}" text-anchor="middle" font-weight="500">${esc(c.label)}</text>`;
      s+=`</g>`;});
    notes.forEach(n=>{const sl=isSel(n.id);
      s+=`<g data-type="note" data-id="${n.id}" style="cursor:${annotationEdit?'grab':'default'}" opacity="${annotationEdit?1:0.7}">`;
      s+=`<rect x="${n.x*g}" y="${n.y*g}" width="${n.w*g}" height="${n.h*g}" fill="${n.color}" stroke="${sl?'#F59E0B':(n.borderColor||'#D97706')}" stroke-width="${sl?2.5:1}" stroke-dasharray="4,2" rx="${n.round}" style="filter:drop-shadow(0 1px 2px rgba(0,0,0,0.08))"/>`;
      n.label.split("\\n").forEach((line,li)=>{const ty=n.y*g+6+li*14;s+=`<text x="${n.x*g+6}" y="${ty+10}" font-size="11" font-weight="400" fill="${n.textColor}" text-anchor="start" style="pointer-events:none">${esc(line)}</text>`;});
      s+=`</g>`;});
  }

  // Resize handles for selected items
  sel.forEach(si=>{
    const it=getItem(si); if(!it)return;
    const isNote=it.type==='note';
    if(isNote&&!annotationEdit)return;
    if(!isNote&&annotationEdit)return;
    const x=it.x*g, y=it.y*g, w=it.w*g, h=it.h*g;
    const hs=10, hitS=20;
    const hColor=isNote?'#F59E0B':'#6366F1';
    const handles=[
      {cx:x,    cy:y,    cur:'nw-resize',edge:'nw'},{cx:x+w,  cy:y,    cur:'ne-resize',edge:'ne'},
      {cx:x,    cy:y+h,  cur:'sw-resize',edge:'sw'},{cx:x+w,  cy:y+h,  cur:'se-resize',edge:'se'},
      {cx:x+w/2,cy:y,    cur:'n-resize', edge:'n'}, {cx:x+w/2,cy:y+h,  cur:'s-resize', edge:'s'},
      {cx:x,    cy:y+h/2,cur:'w-resize', edge:'w'}, {cx:x+w,  cy:y+h/2,cur:'e-resize', edge:'e'},
    ];
    handles.forEach(hd=>{
      s+=`<rect data-resize="${hd.edge}" data-rid="${si.id}" data-rtype="${si.type}" x="${hd.cx-hitS/2}" y="${hd.cy-hitS/2}" width="${hitS}" height="${hitS}" fill="transparent" style="cursor:${hd.cur}" />`;
      s+=`<rect x="${hd.cx-hs/2}" y="${hd.cy-hs/2}" width="${hs}" height="${hs}" fill="${hColor}" stroke="#fff" stroke-width="1.5" rx="2" style="pointer-events:none" />`;
    });
  });

  s+=`</svg>`;
  document.getElementById('svg-wrap').innerHTML=s;
  setupInteractions();
}

// ═══════════════════════════════════════════════
// Interactions: Drag, Resize, Select
// ═══════════════════════════════════════════════
function getSvgScale(){
  const svg=document.querySelector('#svg-wrap svg');
  if(!svg)return{sx:1,sy:1};
  const r=svg.getBoundingClientRect();
  return{sx:parsed.canvas.width/r.width, sy:parsed.canvas.height/r.height};
}

function setupInteractions(){
  const g=parsed.canvas.grid;

  // Resize handles
  document.querySelectorAll('[data-resize]').forEach(el=>{
    el.addEventListener('mousedown',e=>{
      e.preventDefault();e.stopPropagation();
      const edge=el.dataset.resize, id=el.dataset.rid, type=el.dataset.rtype;
      const item=type==="block"?parsed.blockMap[id]:type==="note"?parsed.noteMap[id]:parsed.groupMap[id];
      if(!item)return;
      pushHistory();
      const{sx,sy}=getSvgScale();
      const mx0=e.clientX, my0=e.clientY;
      const ox=item.x, oy=item.y, ow=item.w, oh=item.h;

      function onMove(ev){
        const dxg=Math.round((ev.clientX-mx0)*sx/g), dyg=Math.round((ev.clientY-my0)*sy/g);
        let nx=ox, ny=oy, nw=ow, nh=oh;
        if(edge.includes('e')){nw=Math.max(1,ow+dxg);}
        if(edge.includes('w')){nw=Math.max(1,ow-dxg);nx=ox+ow-nw;}
        if(edge.includes('s')){nh=Math.max(1,oh+dyg);}
        if(edge.includes('n')){nh=Math.max(1,oh-dyg);ny=oy+oh-nh;}
        updatePos(type,id,Math.max(0,nx),Math.max(0,ny));
        updateSize(type,id,nw,nh);
        parsed=parseDSL(dsl); renderSVG(); syncEditor();
      }
      function onUp(){window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);refresh();}
      window.addEventListener('mousemove',onMove);
      window.addEventListener('mouseup',onUp);
    });
  });

  // Drag items
  document.querySelectorAll('#svg-wrap g[data-id]').forEach(el=>{
    el.addEventListener('mousedown',e=>{
      e.preventDefault();e.stopPropagation();
      const type=el.dataset.type, id=el.dataset.id;
      if(type==='note'&&!annotationEdit)return;
      if(type!=='note'&&annotationEdit)return;

      // Selection logic: Shift adds, otherwise replaces
      if(e.shiftKey){
        if(isSel(id)) sel=sel.filter(s=>s.id!==id); else sel.push({type,id});
      } else {
        if(!isSel(id)) sel=[{type,id}];
        // if already selected, keep current multi-sel for drag
      }
      renderProps(); renderSVG();

      // Now drag ALL selected items
      const{sx,sy}=getSvgScale();
      const mx0=e.clientX, my0=e.clientY;
      // Collect all items to move (including children of selected groups)
      const dragSet=new Map();
      sel.forEach(si=>{
        const it=getItem(si); if(!it)return;
        dragSet.set(si.id,{type:si.type,id:si.id,sx:it.x,sy:it.y});
        if(si.type==="group"){
          const ch=findChildren(it);
          ch.childBlocks.forEach(b=>{if(!dragSet.has(b.id))dragSet.set(b.id,{type:"block",id:b.id,sx:b.x,sy:b.y});});
          ch.childGroups.forEach(cg=>{if(!dragSet.has(cg.id))dragSet.set(cg.id,{type:"group",id:cg.id,sx:cg.x,sy:cg.y});});
        }
      });
      const items=[...dragSet.values()];
      let moved=false, histPushed=false;

      function onMove(ev){
        if(!histPushed){pushHistory();histPushed=true;}
        moved=true;
        const dx=Math.round((ev.clientX-mx0)*sx/g), dy=Math.round((ev.clientY-my0)*sy/g);
        items.forEach(it=>updatePos(it.type,it.id,Math.max(0,it.sx+dx),Math.max(0,it.sy+dy)));
        parsed=parseDSL(dsl); renderSVG(); syncEditor();
      }
      function onUp(ev){
        window.removeEventListener('mousemove',onMove);
        window.removeEventListener('mouseup',onUp);
        if(!moved)return; refresh();
      }
      window.addEventListener('mousemove',onMove);
      window.addEventListener('mouseup',onUp);
    });
  });

  // Click blank to deselect
  const svg=document.querySelector('#svg-wrap svg');
  if(svg)svg.addEventListener('mousedown',e=>{
    if(e.target.tagName==='svg'||(e.target.tagName==='rect'&&!e.target.closest('g[data-id]')&&!e.target.dataset.resize)){
      sel=[]; renderProps(); renderSVG();
    }
  });
}

function renderProps(){
  const el=document.getElementById('prop-content'), title=document.getElementById('prop-title');

  if(sel.length===0){
    title.textContent=annotationEdit?'注釈ツール':'ツール';
    if(annotationEdit){
      el.innerHTML=`<div class="prop-section">
        <button class="prop-btn" style="border-color:#F59E0B;color:#FDE68A" onclick="addNote()">+ 注釈追加</button>
      </div>
      <div style="font-size:10px;color:var(--dim);margin-top:16px;line-height:1.5">
        注釈編集モード中<br>ブロック/グループは操作できません<br>
        <span style="color:var(--muted)">✎ 編集</span> ボタンで解除
      </div>`;
    } else {
      el.innerHTML=`<div class="prop-section">
        <button class="prop-btn prop-btn-accent" style="margin-bottom:6px" onclick="addBlock()">+ ブロック追加</button>
        <button class="prop-btn" style="border-color:#818CF8;color:#C4B5FD" onclick="addGroup()">+ グループ追加</button>
      </div>
      <div class="prop-label" style="margin-top:16px;margin-bottom:6px">接続追加</div>
      <div class="prop-row"><input class="prop-input" id="conn-from" placeholder="from"><span style="color:var(--muted);font-size:14px;line-height:28px">→</span><input class="prop-input" id="conn-to" placeholder="to"></div>
      <button class="prop-btn" onclick="addConn()">接続追加</button>
      <div style="font-size:10px;color:var(--dim);margin-top:16px;line-height:1.5">
          クリック選択 / Shift+クリック複数選択<br>ドラッグ移動 / ハンドルでリサイズ<br>
          <span style="color:var(--muted)">Ctrl+Z</span> 戻る <span style="color:var(--muted)">Ctrl+Y</span> やり直し<br>
          <span style="color:var(--muted)">Ctrl+C</span> コピー <span style="color:var(--muted)">Ctrl+X</span> 切取<br>
          <span style="color:var(--muted)">Ctrl+V</span> 貼付 <span style="color:var(--muted)">Ctrl+A</span> 全選択<br>
          <span style="color:var(--muted)">Delete</span> 削除<br>
          <span style="color:var(--muted)">H</span> ハイライト <span style="color:var(--muted)">N</span> 注釈
        </div>`;
    }
    return;
  }

  // Multi-select
  if(sel.length>1){
    title.textContent=`${sel.length}個選択中`;
    const hasBlocks=sel.some(s=>parsed.blockMap[s.id]);
    const colorDots=COLORS.map(c=>`<div class="color-dot" style="background:${c}" onclick="batchProp('color','${c}')"></div>`).join('');
    let html=`<div style="font-size:12px;font-weight:700;color:#A5B4FC;margin-bottom:10px">${sel.length}個のアイテムを選択中</div>`;
    html+=`<div class="prop-section"><div class="prop-label">一括 位置調整</div>
      <div class="prop-row">
        <div style="flex:1"><div class="prop-sub">X</div><div class="stepper"><input class="prop-input" value="" placeholder="—" disabled><div class="step-col"><button class="step-btn up" onclick="batchNudge('x',-1)">▲</button><button class="step-btn dn" onclick="batchNudge('x',1)">▼</button></div></div></div>
        <div style="flex:1"><div class="prop-sub">Y</div><div class="stepper"><input class="prop-input" value="" placeholder="—" disabled><div class="step-col"><button class="step-btn up" onclick="batchNudge('y',-1)">▲</button><button class="step-btn dn" onclick="batchNudge('y',1)">▼</button></div></div></div>
      </div></div>`;
    html+=`<div class="prop-section"><div class="prop-label">一括 サイズ調整</div>
      <div class="prop-row">
        <div style="flex:1"><div class="prop-sub">W</div><div class="stepper"><input class="prop-input" value="" placeholder="—" disabled><div class="step-col"><button class="step-btn up" onclick="batchNudgeSz('w',1)">▲</button><button class="step-btn dn" onclick="batchNudgeSz('w',-1)">▼</button></div></div></div>
        <div style="flex:1"><div class="prop-sub">H</div><div class="stepper"><input class="prop-input" value="" placeholder="—" disabled><div class="step-col"><button class="step-btn up" onclick="batchNudgeSz('h',1)">▲</button><button class="step-btn dn" onclick="batchNudgeSz('h',-1)">▼</button></div></div></div>
      </div></div>`;
    html+=`<div class="prop-section"><div class="prop-label">一括 色変更</div><div class="color-grid">${colorDots}</div></div>`;
    if(hasBlocks) html+=`<div class="prop-section"><div class="prop-label">一括 スタイル</div><div style="display:flex;gap:4px">${["solid","dashed","bold"].map(st=>`<button class="style-btn" onclick="batchProp('style','${st}')">${st}</button>`).join('')}</div></div>`;
    if(sel.length===2){
      const a=sel[0].id,b=sel[1].id,conns=findConnsBetween(a,b);
      html+=`<div class="prop-section"><div class="prop-label">接続</div>`;
      const connColors=["#64748B","#6366F1","#8B5CF6","#EC4899","#EF4444","#F59E0B","#22C55E","#3B82F6","#06B6D4","#DC2626","#1E293B","#0F172A"];
      if(conns.length===0){
        html+=`<div style="display:flex;gap:4px"><button class="prop-btn" onclick="connectTwo('${a}','${b}')" style="flex:1;background:#6366F1;color:#fff">${a} → ${b}</button><button class="prop-btn" onclick="connectTwo('${b}','${a}')" style="flex:1;background:#6366F1;color:#fff">${b} → ${a}</button></div>`;
        html+=`<div class="prop-sub" style="margin-top:6px">色を指定して接続</div><div class="color-grid">${connColors.map(c=>`<div class="color-dot" style="background:${c}" onclick="connectTwo('${a}','${b}','${c}')"></div>`).join('')}</div>`;
      } else {
        const c=conns[0],fa=c.from,ta=c.to;
        html+=`<div style="padding:6px 8px;background:var(--surface);border-radius:6px;margin-bottom:8px;font-size:12px;color:var(--fg);text-align:center">${esc(fa)} ${c.bidir?'↔':'→'} ${esc(ta)}</div>`;
        html+=`<div style="display:flex;gap:4px;flex-wrap:wrap">`;
        html+=`<button class="prop-btn" onclick="flipConn('${fa}','${ta}')" style="flex:1" title="方向を反転">⇄ 反転</button>`;
        html+=`<button class="prop-btn" onclick="toggleBidir('${fa}','${ta}')" style="flex:1" title="双方向切替">${c.bidir?'→ 片方向':'↔ 双方向'}</button>`;
        html+=`</div>`;
        html+=`<div class="prop-sub" style="margin-top:6px">線の色</div><div class="color-grid">${connColors.map(cl=>`<div class="color-dot ${c.color===cl?'active':''}" style="background:${cl}" onclick="setConnColor('${fa}','${ta}','${cl}')"></div>`).join('')}</div>`;
        html+=`<div style="margin-top:4px"><button class="prop-btn prop-btn-red" onclick="removeConn('${fa}','${ta}')" style="width:100%">接続を削除</button></div>`;
      }
      html+=`</div>`;
    }
    html+=`<div style="margin-top:16px"><button class="prop-btn prop-btn-red" onclick="batchDelete()">選択を全削除</button></div>`;
    el.innerHTML=html; return;
  }

  // Single select
  const si=sel[0], item=getItem(si);
  if(!item){sel=[];renderProps();return;}
  const isBlock=item.type==="block", isNote=item.type==="note";
  title.textContent='プロパティ';
  const NOTE_COLORS=["#FEF3C7","#FEE2E2","#DBEAFE","#DCFCE7","#F5F3FF","#FCE7F3","#CFFAFE","#FFF7ED","#F1F5F9","#FEF9C3","#ECFDF5","#F8FAFC"];
  const colors=isNote?NOTE_COLORS:isBlock?COLORS:BG_COLORS;
  const colorDots=colors.map(c=>`<div class="color-dot ${item.color===c?'active':''}" style="background:${c}" onclick="setProp('color','${c}')"></div>`).join('');
  const typeLabel=isNote?'NOTE':isBlock?'BLOCK':'GROUP';
  const typeColor=isNote?'#F59E0B':isBlock?'#6366F1':'#818CF8';

  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <span style="font-size:12px;font-weight:700;color:${typeColor}">${typeLabel}: ${item.id}</span>
    <button onclick="sel=[];renderProps();renderSVG()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px">✕</button></div>
    <div class="prop-section"><div class="prop-label">${isNote?'テキスト':'ラベル'}</div>${isNote?`<textarea class="prop-input" id="note-text" style="height:80px;resize:vertical;font-size:11px;line-height:1.4" oninput="setNoteLabel(this.value)">${item.label.split('\\\\n').join('\n')}</textarea>`:`<input class="prop-input" value="${esc(item.label)}" oninput="setLabel(this.value)">`}${isBlock?'<div class="prop-sub">改行は \\\\n で入力</div>':''}</div>
    <div class="prop-section"><div class="prop-label">位置 (grid)</div><div class="prop-row">
      <div style="flex:1"><div class="prop-sub">X</div><div class="stepper"><input class="prop-input" type="number" min="0" value="${item.x}" oninput="setPos('x',this.value)"><div class="step-col"><button class="step-btn up" onclick="nudge('x',1)">▲</button><button class="step-btn dn" onclick="nudge('x',-1)">▼</button></div></div></div>
      <div style="flex:1"><div class="prop-sub">Y</div><div class="stepper"><input class="prop-input" type="number" min="0" value="${item.y}" oninput="setPos('y',this.value)"><div class="step-col"><button class="step-btn up" onclick="nudge('y',-1)">▲</button><button class="step-btn dn" onclick="nudge('y',1)">▼</button></div></div></div>
    </div></div>
    <div class="prop-section"><div class="prop-label">サイズ (grid)</div><div class="prop-row">
      <div style="flex:1"><div class="prop-sub">W</div><div class="stepper"><input class="prop-input" type="number" min="1" value="${item.w}" oninput="setSz('w',this.value)"><div class="step-col"><button class="step-btn up" onclick="nudgeSz('w',1)">▲</button><button class="step-btn dn" onclick="nudgeSz('w',-1)">▼</button></div></div></div>
      <div style="flex:1"><div class="prop-sub">H</div><div class="stepper"><input class="prop-input" type="number" min="1" value="${item.h}" oninput="setSz('h',this.value)"><div class="step-col"><button class="step-btn up" onclick="nudgeSz('h',1)">▲</button><button class="step-btn dn" onclick="nudgeSz('h',-1)">▼</button></div></div></div>
    </div></div>
    <div class="prop-section"><div class="prop-label">背景色</div><div class="color-grid">${colorDots}</div><input class="prop-input" style="width:100px" value="${item.color}" oninput="setProp('color',this.value)" placeholder="#RRGGBB"></div>`;

  if(isBlock||isNote){
    html+=`<div class="prop-section"><div class="prop-label">テキスト色</div><div class="color-grid">${["#FFFFFF","#000000","#1E293B","#F8FAFC","#92400E","#991B1B","#1E40AF","#166534"].map(c=>`<div class="color-dot ${item.textColor===c?'active':''}" style="background:${c}" onclick="setProp('text','${c}')"></div>`).join('')}</div></div>`;
  }
  if(!isBlock&&!isNote){
    html+=`<div class="prop-section"><div class="prop-label">枠線色</div><div class="color-grid">${COLORS.map(c=>`<div class="color-dot ${item.borderColor===c?'active':''}" style="background:${c}" onclick="setProp('border','${c}')"></div>`).join('')}</div><input class="prop-input" style="width:100px" value="${item.borderColor||''}" oninput="setProp('border',this.value)" placeholder="#RRGGBB"></div>`;
    html+=`<div class="prop-section"><button class="prop-btn" onclick="addBlockInGroup('${item.id}')" style="background:#6366F1;color:#fff;width:100%">＋ ブロック追加</button></div>`;
  }
  if(isBlock||isNote){
    html+=`<div class="prop-section"><div class="prop-label">角丸 (px)</div><div class="stepper" style="width:90px"><input class="prop-input" type="number" min="0" value="${item.round}" oninput="setProp('round',this.value)"><div class="step-col"><button class="step-btn up" onclick="nudgeRound(1)">▲</button><button class="step-btn dn" onclick="nudgeRound(-1)">▼</button></div></div></div>`;
  }
  if(isBlock){
    html+=`<div class="prop-section"><div class="prop-label">スタイル</div><div style="display:flex;gap:4px">${["solid","dashed","bold"].map(st=>`<button class="style-btn ${item.style===st?'active':''}" onclick="setProp('style','${st}')">${st}</button>`).join('')}</div></div>`;
  }
  html+=`<div style="margin-top:16px"><button class="prop-btn prop-btn-red" onclick="deleteItem()">削除</button></div>`;
  el.innerHTML=html;
}

// ═══════════════════════════════════════════════
// Actions: single
// ═══════════════════════════════════════════════
function setProp(p,v){if(!sel.length)return;pushHistory();const s=sel[0];updateProp(s.type,s.id,p,v);refresh();}
function setLabel(v){if(!sel.length)return;pushHistory();const s=sel[0];updateLabel(s.type,s.id,v);parsed=parseDSL(dsl);syncEditor();renderSVG();renderErrors();renderStatus();}
function setNoteLabel(v){if(!sel.length)return;pushHistory();const s=sel[0];updateLabel(s.type,s.id,v.replace(/\n/g,'\\n'));parsed=parseDSL(dsl);syncEditor();renderSVG();renderErrors();renderStatus();}
function setPos(axis,v){if(!sel.length)return;const n=parseInt(v);if(isNaN(n)||n<0)return;pushHistory();const s=sel[0],it=getItem(s);if(!it)return;updatePos(s.type,s.id,axis==='x'?n:it.x,axis==='y'?n:it.y);refresh();}
function setSz(axis,v){if(!sel.length)return;const n=parseInt(v);if(isNaN(n)||n<1)return;pushHistory();const s=sel[0],it=getItem(s);if(!it)return;updateSize(s.type,s.id,axis==='w'?n:it.w,axis==='h'?n:it.h);refresh();}
function nudge(axis,delta){if(!sel.length)return;pushHistory();const s=sel[0],it=getItem(s);if(!it)return;
  if(s.type==='group'){const ch=findChildren(it);ch.childBlocks.forEach(b=>updatePos('block',b.id,b.x+(axis==='x'?delta:0),b.y+(axis==='y'?delta:0)));ch.childGroups.forEach(g=>updatePos('group',g.id,g.x+(axis==='x'?delta:0),g.y+(axis==='y'?delta:0)));}
  updatePos(s.type,s.id,Math.max(0,it.x+(axis==='x'?delta:0)),Math.max(0,it.y+(axis==='y'?delta:0)));refresh();}
function nudgeSz(axis,delta){if(!sel.length)return;pushHistory();const s=sel[0],it=getItem(s);if(!it)return;updateSize(s.type,s.id,axis==='w'?Math.max(1,it.w+delta):it.w,axis==='h'?Math.max(1,it.h+delta):it.h);refresh();}
function nudgeRound(delta){if(!sel.length)return;pushHistory();const it=parsed.blockMap[sel[0].id];if(!it)return;setProp('round',Math.max(0,it.round+delta));}
function deleteItem(){if(!sel.length)return;pushHistory();const{type,id}=sel[0];const lines=dsl.split("\n"),re=new RegExp(`^\\s*${type}\\s+${id}\\s+`),c1=new RegExp(`(^|\\s)${id}(\\s+(-->|->)\\s+|$)`),c2=new RegExp(`\\s+(-->|->)\\s+${id}(\\s|$)`);dsl=lines.filter(l=>!re.test(l)&&!c1.test(l)&&!c2.test(l)).join("\n");sel=[];refresh();}

// ═══════════════════════════════════════════════
// Actions: batch (multi-select)
// ═══════════════════════════════════════════════
function batchNudge(axis,delta){
  pushHistory();
  sel.forEach(si=>{
    const it=getItem(si);if(!it)return;
    if(si.type==='group'){const ch=findChildren(it);ch.childBlocks.forEach(b=>updatePos('block',b.id,Math.max(0,b.x+(axis==='x'?delta:0)),Math.max(0,b.y+(axis==='y'?delta:0))));ch.childGroups.forEach(g=>updatePos('group',g.id,Math.max(0,g.x+(axis==='x'?delta:0)),Math.max(0,g.y+(axis==='y'?delta:0))));}
    updatePos(si.type,si.id,Math.max(0,it.x+(axis==='x'?delta:0)),Math.max(0,it.y+(axis==='y'?delta:0)));
  }); refresh();
}
function batchNudgeSz(axis,delta){
  pushHistory();
  sel.forEach(si=>{const it=getItem(si);if(!it)return;updateSize(si.type,si.id,axis==='w'?Math.max(1,it.w+delta):it.w,axis==='h'?Math.max(1,it.h+delta):it.h);});refresh();
}
function batchProp(prop,val){pushHistory();sel.forEach(si=>updateProp(si.type,si.id,prop,val));refresh();}
function batchDelete(){
  pushHistory();
  sel.forEach(si=>{const{type,id}=si;const lines=dsl.split("\n"),re=new RegExp(`^\\s*${type}\\s+${id}\\s+`),c1=new RegExp(`(^|\\s)${id}(\\s+(-->|->)\\s+|$)`),c2=new RegExp(`\\s+(-->|->)\\s+${id}(\\s|$)`);dsl=lines.filter(l=>!re.test(l)&&!c1.test(l)&&!c2.test(l)).join("\n");});
  sel=[];refresh();
}

// ═══════════════════════════════════════════════
// Connection management (two-select)
// ═══════════════════════════════════════════════
function findConnsBetween(a,b){return parsed.connections.filter(c=>(c.from===a&&c.to===b)||(c.from===b&&c.to===a));}
function connectTwo(a,b,col){pushHistory();const extra=col?` color=${col}`:'';dsl=dsl.trimEnd()+`\n${a} -> ${b}${extra}\n`;refresh();}
function removeConn(a,b){pushHistory();const lines=dsl.split("\n");dsl=lines.filter(l=>{const m=l.trim().match(/^(\S+)\s+(-->|->)\s+(\S+)/);if(!m)return true;return!((m[1]===a&&m[3]===b)||(m[1]===b&&m[3]===a));}).join("\n");refresh();}
function flipConn(a,b){pushHistory();const lines=dsl.split("\n");for(let i=0;i<lines.length;i++){const m=lines[i].trim().match(/^(\S+)(\s+)(-->|->)(\s+)(\S+)(.*)/);if(!m)continue;if((m[1]===a&&m[5]===b)||(m[1]===b&&m[5]===a)){lines[i]=lines[i].replace(/^(\s*)(\S+)(\s+)(-->|->)(\s+)(\S+)/,`$1${m[5]}$3$4$5${m[1]}`);break;}}dsl=lines.join("\n");refresh();}
function toggleBidir(a,b){pushHistory();const lines=dsl.split("\n");for(let i=0;i<lines.length;i++){const m=lines[i].trim().match(/^(\S+)\s+(-->|->)\s+(\S+)/);if(!m)continue;if((m[1]===a&&m[3]===b)||(m[1]===b&&m[3]===a)){lines[i]=m[2]==='-->'?lines[i].replace('-->','->'):lines[i].replace('->','-->');break;}}dsl=lines.join("\n");refresh();}
function setConnColor(a,b,col){pushHistory();const lines=dsl.split("\n");for(let i=0;i<lines.length;i++){const m=lines[i].trim().match(/^(\S+)\s+(-->|->)\s+(\S+)/);if(!m)continue;if((m[1]===a&&m[3]===b)||(m[1]===b&&m[3]===a)){lines[i]=lines[i].match(/color=\S+/)?lines[i].replace(/color=\S+/,`color=${col}`):lines[i].trimEnd()+` color=${col}`;break;}}dsl=lines.join("\n");refresh();}

// ═══════════════════════════════════════════════
// Add items
// ═══════════════════════════════════════════════
function addBlock(){pushHistory();const id=`__new_${addCounter++}`;dsl=dsl.trimEnd()+`\nblock ${id} "New Block" at 5,5 size 8x3 color=#3B82F6 text=#FFFFFF round=4\n`;sel=[{type:"block",id}];refresh();}
function addBlockInGroup(gid){const gr=parsed.groupMap[gid];if(!gr)return;pushHistory();const id=`__new_${addCounter++}`;const ch=findChildren(gr).childBlocks;const bw=8,bh=3,pad=1,labelH=2;let px=gr.x+pad,py=gr.y+labelH;if(ch.length){const sorted=[...ch].sort((a,b)=>a.y===b.y?a.x-b.x:a.y-b.y);const last=sorted[sorted.length-1];px=last.x+last.w+pad;py=last.y;if(px+bw>gr.x+gr.w-pad){px=gr.x+pad;py=last.y+last.h+pad;}if(py+bh>gr.y+gr.h){updateSize('group',gid,gr.w,py+bh-gr.y+pad);parsed=parseDSL(dsl);}}dsl=dsl.trimEnd()+`\nblock ${id} "New Block" at ${px},${py} size ${bw}x${bh} color=#3B82F6 text=#FFFFFF round=4\n`;sel=[{type:"block",id}];refresh();}
function addGroup(){pushHistory();const id=`__new_${addCounter++}`;dsl=dsl.trimEnd()+`\ngroup ${id} "New Group" at 5,5 size 20x8 color=#F1F5F9 border=#94A3B8\n`;sel=[{type:"group",id}];refresh();}
function addNote(){pushHistory();const id=`__new_${addCounter++}`;dsl=dsl.trimEnd()+`\nnote ${id} "Annotation" at 5,5 size 8x2 color=#FEF3C7 text=#92400E\n`;sel=[{type:"note",id}];if(!annotationEdit){annotationEdit=true;showAnnotations=true;document.getElementById('anno-btn').classList.add('tb-anno-active');document.getElementById('anno-edit-btn').style.display='';document.getElementById('anno-edit-btn').classList.add('tb-anno-edit');}refresh();}
function addConn(){const f=document.getElementById('conn-from')?.value,t=document.getElementById('conn-to')?.value;if(f&&t){pushHistory();dsl=dsl.trimEnd()+`\n${f} -> ${t}\n`;refresh();}}
function labelToId(label){return label.replace(/\\n/g,' ').replace(/[^a-zA-Z0-9\s]/g,'').trim().replace(/\s+/g,'_').toLowerCase()||'block';}
function fixNames(){
  if(!parsed)return;
  const targets=[...parsed.blocks,...parsed.groups,...parsed.notes].filter(x=>x.id.startsWith('__new_'));
  if(!targets.length)return;
  pushHistory();
  const usedIds=new Set([...parsed.blocks,...parsed.groups,...parsed.notes].filter(x=>!x.id.startsWith('__new_')).map(x=>x.id));
  const renames=[];
  targets.forEach(t=>{
    let base=labelToId(t.label);if(usedIds.has(base)){let n=2;while(usedIds.has(`${base}_${n}`))n++;base=`${base}_${n}`;}
    usedIds.add(base);renames.push({old:t.id,new:base});
  });
  renames.forEach(r=>{dsl=dsl.replace(new RegExp(`\\b${r.old.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}\\b`,'g'),r.new);});
  sel=sel.map(s=>{const r=renames.find(r=>r.old===s.id);return r?{...s,id:r.new}:s;});
  refresh();
}

// ═══════════════════════════════════════════════
// Editor / Refresh
// ═══════════════════════════════════════════════
function syncEditor(){suppressSync=true;document.getElementById('editor').value=dsl;suppressSync=false;renderLineNums();}
function renderLineNums(){const el=document.getElementById('line-nums');el.innerHTML=dsl.split("\n").map((_,i)=>`<div>${i+1}</div>`).join('');}
function refresh(){parsed=parseDSL(dsl);syncEditor();renderSVG();renderProps();renderErrors();renderStatus();}
function renderErrors(){const el=document.getElementById('error-bar');if(parsed.errors.length){el.style.display='block';el.innerHTML=parsed.errors.map(e=>`L${e.line}: ${esc(e.msg)}`).join('<br>');}else{el.style.display='none';}}
function renderStatus(){document.getElementById('status').innerHTML=`<span>Blocks: ${parsed.blocks.length}</span><span>Groups: ${parsed.groups.length}</span><span>Notes: ${parsed.notes.length}</span><span>Conn: ${parsed.connections.length}</span><span>Canvas: ${parsed.canvas.width}×${parsed.canvas.height}</span><span>Selected: ${sel.length}</span>`+(parsed.errors.length?`<span style="color:var(--red)">Err: ${parsed.errors.length}</span>`:'');}

// ═══════════════════════════════════════════════
// Export / Import
// ═══════════════════════════════════════════════
function download(name,data){const a=document.createElement('a');a.href=data;a.download=name;document.body.appendChild(a);a.click();document.body.removeChild(a);}
function exportSB(){download('diagram.sb','data:text/plain;charset=utf-8,'+encodeURIComponent(dsl));}
function exportSVG(){const svg=document.querySelector('#svg-wrap svg');if(!svg)return;download('diagram.svg','data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg.outerHTML));}
function exportPNG(){const svg=document.querySelector('#svg-wrap svg');if(!svg)return;const data=new XMLSerializer().serializeToString(svg);const img=new Image();img.onload=()=>{const c=document.createElement('canvas');c.width=parsed.canvas.width*zoom*2;c.height=parsed.canvas.height*zoom*2;const ctx=c.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);ctx.drawImage(img,0,0,c.width,c.height);download('diagram.png',c.toDataURL('image/png'));};img.src='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(data)));}
function importSB(input){const file=input.files?.[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{pushHistory();dsl=ev.target.result;sel=[];refresh();};reader.readAsText(file);input.value='';}
function setZoom(dir){zoom=Math.max(0.25,Math.min(3,zoom+dir*0.25));document.getElementById('zoom-label').textContent=Math.round(zoom*100)+'%';renderSVG();}

// ═══════════════════════════════════════════════
// Copy / Cut / Paste
// ═══════════════════════════════════════════════
function getItemDSLLine(type,id){
  const lines=dsl.split("\n");
  const re=new RegExp(`^\\s*${type}\\s+${id}\\s+`);
  return lines.find(l=>re.test(l))||null;
}
function copySelection(){
  if(!sel.length)return;
  clipboard=sel.map(si=>{const line=getItemDSLLine(si.type,si.id);return line?{type:si.type,id:si.id,line:line.trim()}:null;}).filter(Boolean);
}
function cutSelection(){
  if(!sel.length)return;
  copySelection();
  pushHistory();
  sel.forEach(si=>{
    const lines=dsl.split("\n"),re=new RegExp(`^\\s*${si.type}\\s+${si.id}\\s+`),c1=new RegExp(`(^|\\s)${si.id}(\\s+(-->|->)\\s+|$)`),c2=new RegExp(`\\s+(-->|->)\\s+${si.id}(\\s|$)`);
    dsl=lines.filter(l=>!re.test(l)&&!c1.test(l)&&!c2.test(l)).join("\n");
  });
  sel=[];refresh();
}
function pasteClipboard(){
  if(!clipboard||!clipboard.length)return;
  pushHistory();
  const newSel=[];
  clipboard.forEach(ci=>{
    // Generate unique ID for paste
    const newId=`__new_${addCounter++}`;
    // Offset pasted items by 2 grid units
    let line=ci.line.replace(new RegExp(`^(${ci.type}\\s+)${ci.id}`),`$1${newId}`);
    line=line.replace(/at\s+([\d.]+),([\d.]+)/,(m,x,y)=>`at ${+x+2},${+y+2}`);
    dsl=dsl.trimEnd()+"\n"+line+"\n";
    newSel.push({type:ci.type,id:newId});
  });
  sel=newSel;
  refresh();
}

// ═══════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════
const editor=document.getElementById('editor');
editor.value=dsl;
let editorHistTimer=null;
editor.addEventListener('input',()=>{
  if(suppressSync)return;
  // Debounced history push for typing
  if(!editorHistTimer){pushHistory();}
  clearTimeout(editorHistTimer);
  editorHistTimer=setTimeout(()=>{editorHistTimer=null;},1000);
  dsl=editor.value;parsed=parseDSL(dsl);renderSVG();renderErrors();renderStatus();renderLineNums();
});
editor.addEventListener('scroll',()=>{document.getElementById('line-nums').scrollTop=editor.scrollTop;});

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  const inEditor=document.activeElement===editor || document.activeElement?.closest('#prop-content');
  // Ctrl+Z: Undo (always works)
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();undo();return;}
  // Ctrl+Y or Ctrl+Shift+Z: Redo
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();redo();return;}
  // Below only when not editing text
  if(inEditor)return;
  // Ctrl+C: Copy
  if((e.ctrlKey||e.metaKey)&&e.key==='c'){e.preventDefault();copySelection();return;}
  // Ctrl+X: Cut
  if((e.ctrlKey||e.metaKey)&&e.key==='x'){e.preventDefault();cutSelection();return;}
  // Ctrl+V: Paste
  if((e.ctrlKey||e.metaKey)&&e.key==='v'){e.preventDefault();pasteClipboard();return;}
  // Delete / Backspace: delete selected
  if(e.key==='Delete'||e.key==='Backspace'){if(sel.length>1){e.preventDefault();batchDelete();}else if(sel.length===1){e.preventDefault();deleteItem();}return;}
  // Ctrl+A: select all
  if((e.ctrlKey||e.metaKey)&&e.key==='a'){e.preventDefault();if(annotationEdit)sel=parsed.notes.map(n=>({type:'note',id:n.id}));else sel=[...parsed.blocks.map(b=>({type:'block',id:b.id})),...parsed.groups.map(g=>({type:'group',id:g.id}))];renderProps();renderSVG();return;}
  // Arrow keys: move selected
  if(sel.length&&['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)){e.preventDefault();const ax=e.key==='ArrowLeft'||e.key==='ArrowRight'?'x':'y';const d=e.key==='ArrowRight'||e.key==='ArrowDown'?1:-1;if(sel.length>1)batchNudge(ax,d);else nudge(ax,d);return;}
  // H: toggle highlight
  if(e.key==='h'||e.key==='H'){e.preventDefault();toggleHighlight();return;}
  if(e.key==='n'||e.key==='N'){e.preventDefault();toggleAnnotations();return;}
});

parsed=parseDSL(dsl);renderSVG();renderProps();renderErrors();renderStatus();renderLineNums();
</script>
